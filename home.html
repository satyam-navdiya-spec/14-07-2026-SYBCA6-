<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarSell - Buy Your Dream Car</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:15px 50px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
color:#ff3b3b;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.hero{
height:80vh;
background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80') center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero h2{
font-size:50px;
margin-bottom:20px;
}

.hero button{
padding:15px 30px;
font-size:18px;
border:none;
background:#ff3b3b;
color:white;
border-radius:5px;
cursor:pointer;
}

.cars{
padding:50px;
text-align:center;
}

.cars h2{
margin-bottom:30px;
}

.card-container{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
width:300px;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
margin:15px;
}

.card p{
margin:0 15px 15px;
color:#555;
}

.price{
font-size:22px;
color:red;
font-weight:bold;
}

.card button{
margin:15px;
padding:10px 20px;
background:#111;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>CarSell</h1>

<nav>
<a href="#">Home</a>
<a href="#">Cars</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<div>
<h2>Find Your Dream Car</h2>
<p>Best Deals on New & Used Cars</p>
<br>
<button>Browse Cars</button>
</div>
</section>

<section class="cars">

<h2>Featured Cars</h2>

<div class="card-container">

<div class="card">
<img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&w=800&q=80">
<h3>BMW M4</h3>
<p class="price">$68,000</p>
<p>2024 Model | Automatic | Petrol</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=800&q=80">
<h3>Audi A6</h3>
<p class="price">$59,000</p>
<p>Luxury Sedan | Automatic</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1502877338535-766e1452684a?auto=format&fit=crop&w=800&q=80">
<h3>Mercedes C-Class</h3>
<p class="price">$63,000</p>
<p>Premium Comfort | Automatic</p>
<button>Buy Now</button>
</div>

</div>

</section>

<footer>
<p>© 2026 CarSell. All Rights Reserved.</p>
</footer>

</body>
</html>
