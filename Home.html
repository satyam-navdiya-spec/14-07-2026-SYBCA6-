<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Home Screen Mockup</title>
  <!-- Google Fonts & FontAwesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --phone-bg: linear-gradient(135deg, #1e1e2f, #0f0f15, #251d3a);
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-main: #ffffff;
      --text-sub: rgba(255, 255, 255, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      user-select: none;
    }

    body {
      background: #0b0b0e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* Outer Physical Phone Shell */
    .phone-shell {
      width: 380px;
      height: 780px;
      background: #000000;
      border: 12px solid #2d2d30;
      border-radius: 48px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7),
                  0 0 0 2px #3d3d41;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Screen Area inside the shell */
    .phone-screen {
      flex: 1;
      background: var(--phone-bg);
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      position: relative;
      padding: 12px 18px 20px 18px;
    }

    /* Dynamic Island / Notch */
    .phone-notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 28px;
      background: #000000;
      border-radius: 20px;
      z-index: 10;
      box-shadow: inset 0 0 4px rgba(255,255,255,0.1);
    }

    /* Top Status Bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 600;
      height: 24px;
      margin-bottom: 25px;
      padding: 0 8px;
      z-index: 5;
    }

    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* Search & Widget Component */
    .widget-container {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 24px;
      margin-top: 10px;
    }

    .widget-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #927bf5;
      margin-bottom: 8px;
    }

    .widget-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .widget-temp {
      font-size: 28px;
      font-weight: 300;
    }

    .widget-weather {
      font-size: 13px;
      color: var(--text-sub);
    }

    /* Apps Grid Layout */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-gap: 20px 14px;
      flex-grow: 1;
      align-content: flex-start;
    }

    .app-icon-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .app-icon-wrapper:active {
      transform: scale(0.9);
    }

    .app-icon {
      width: 58px;
      height: 58px;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      position: relative;
    }

    .app-name {
      margin-top: 8px;
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Notification Badge */
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #ff3b30;
      color: white;
      font-size: 10px;
      font-weight: bold;
      border-radius: 10px;
      padding: 2px 6px;
      border: 1.5px solid #1c1c1e;
    }

    /* Custom Gradients for App Styles */
    .bg-blue   { background: linear-gradient(135deg, #2f80ed, #00c6ff); }
    .bg-green  { background: linear-gradient(135deg, #11998e, #38ef7d); }
    .bg-purple { background: linear-gradient(135deg, #7f00ff, #e100ff); }
    .bg-orange { background: linear-gradient(135deg, #f12711, #f5af19); }
    .bg-pink   { background: linear-gradient(135deg, #ff0844, #ffb199); }
    .bg-dark   { background: linear-gradient(135deg, #30cfd0, #330867); }
    .bg-cyan   { background: linear-gradient(135deg, #00f2fe, #4facfe); }
    .bg-yellow { background: linear-gradient(135deg, #ffd200, #f7971e); }

    /* Bottom App Dock */
    .dock-container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 12px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-top: auto;
    }

    .dock-icon {
      width: 56px;
      height: 56px;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      transition: transform 0.15s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .dock-icon:active {
      transform: scale(0.9);
    }

    /* Bottom Home Indicator Bar */
    .home-indicator {
      width: 120px;
      height: 5px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 10px;
      margin: 12px auto 0 auto;
    }
  </style>
</head>
<body>

  <!-- Outer Phone Shell -->
  <div class="phone-shell">
    
    <!-- Dynamic Island / Notch -->
    <div class="phone-notch"></div>
    
    <!-- Phone Screen Contents -->
    <div class="phone-screen">
      
      <!-- Top Status Bar -->
      <div class="status-bar">
        <div class="time" id="clock">12:33</div>
        <div class="status-icons">
          <i class="fa-solid fa-signal"></i>
          <i class="fa-solid fa-wifi"></i>
          <i class="fa-solid fa-battery-three-quarters"></i>
        </div>
      </div>

      <!-- Smart Weather Widget -->
      <div class="widget-container">
        <div class="widget-header">Current Weather</div>
        <div class="widget-content">
          <div>
            <div class="widget-temp">72°F</div>
            <div class="widget-weather">Mostly Sunny</div>
          </div>
          <i class="fa-solid fa-cloud-sun-rain" style="font-size: 38px; color: #f5af19;"></i>
        </div>
      </div>

      <!-- App Grid -->
      <div class="app-grid">
        
        <!-- App 1: Messages -->
        <div class="app-icon-wrapper">
          <div class="app-icon bg-green">
            <i class="fa-regular fa-comment-dots"></i>
            <span class="badge">4</span>
          </div>
          <span class="app-name">Messages</span>
        </div>

        <!-- App 2: Photos -->
        <div class="app-icon-wrapper">
          <div class="app-icon bg-purple">
            <i class="fa-regular fa-image"></i>
          </div>
          <span class="app-name">Photos</span>
        </div>

        <!-- App 3: Settings -->
        <div class="app-icon-wrapper">
          <div class="app-icon bg-dark">
            <i class="fa-solid fa-sliders"></i>
          </div>
          <span class="app-name">Settings</span>
        </div>

        <!-- App 4: Mail -->
        <div class="app-icon-wrapper">
          <div class="app-icon bg-blue">
            <i class="fa-regular fa-envelope"></i>
            <span class="badge">12</span>
          </div>
          <span class="app-name">Mail</span>
        </div>

        <!-- App 5: Calendar -->
        <div class="app-icon-wrapper">
          <div class="app-icon bg-orange">
            <i class="fa-regular fa-calendar-days"></i>
          </div>
          <span class="app-name">Calendar</span>
        </div>

        <!-- App 6: Health -->
        <div class="app-icon-wrapper">
          <div class="app-icon bg-pink">
            <i class="fa-solid fa-heart-pulse"></i>
          </div>
          <span class="app-name">Health</span>
        </div>

        <!-- App 7: Maps -->
        <div class="app-icon-wrapper">
          <div class="app-icon bg-cyan">
            <i class="fa-solid fa-map-location-dot"></i>
          </div>
          <span class="app-name">Maps</span>
        </div>

        <!-- App 8: Wallet -->
        <div class="app-icon-wrapper">
          <div class="app-icon bg-yellow">
            <i class="fa-solid fa-wallet"></i>
          </div>
          <span class="app-name">Wallet</span>
        </div>

      </div>

      <!-- Bottom App Dock -->
      <div class="dock-container">
        <div class="dock-icon bg-blue"><i class="fa-solid fa-phone"></i></div>
        <div class="dock-icon bg-cyan"><i class="fa-solid fa-compass"></i></div>
        <div class="dock-icon bg-green"><i class="fa-brands fa-whatsapp"></i></div>
        <div class="dock-icon bg-purple"><i class="fa-brands fa-spotify"></i></div>
      </div>

      <!-- Home Swipe Indicator -->
      <div class="home-indicator"></div>

    </div>
  </div>

  <!-- Real-time Clock Script -->
  <script>
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      
      // Pad single digits with a leading zero
      hours = hours < 10 ? '0' + hours : hours;
      minutes = minutes < 10 ? '0' + minutes : minutes;
      
      document.getElementById('clock').textContent = `${hours}:${minutes}`;
    }
    
    // Run immediately and update every second
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
  </html>
