<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Contact</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        header{
            background:#8B0000;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#222;
            text-align:center;
            padding:12px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 15px;
            font-size:18px;
        }

        nav a:hover{
            color:gold;
        }

        .container{
            width:90%;
            max-width:1000px;
            margin:40px auto;
            display:flex;
            gap:30px;
            flex-wrap:wrap;
        }

        .contact-info,
        .contact-form{
            flex:1;
            min-width:300px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            color:#8B0000;
            margin-bottom:15px;
        }

        p{
            margin:10px 0;
            line-height:1.6;
        }

        input, textarea{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        textarea{
            resize:none;
            height:120px;
        }

        button{
            background:#8B0000;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#a80000;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }
    </style>
</head>

<body>

<header>
    <h1>Delicious Restaurant</h1>
    <p>Contact Us</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">

    <div class="contact-info">
        <h2>Get in Touch</h2>

        <p><strong>📍 Address:</strong><br>
        123 Food Street, Surat, Gujarat</p>

        <p><strong>📞 Phone:</strong><br>
        +91 98765 43210</p>

        <p><strong>📧 Email:</strong><br>
        info@restaurant.com</p>

        <p><strong>🕒 Opening Hours:</strong><br>
        Mon - Sun: 10:00 AM - 11:00 PM</p>
    </div>

    <div class="contact-form">
        <h2>Send a Message</h2>

        <form>
            <input type="text" placeholder="Your Name" required>

            <input type="email" placeholder="Your Email" required>

            <input type="tel" placeholder="Phone Number">

            <textarea placeholder="Your Message"></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>

</div>

<footer>
    <p>&copy; 2026 Delicious Restaurant. All Rights Reserved.</p>
</footer>

</body>
</html>
