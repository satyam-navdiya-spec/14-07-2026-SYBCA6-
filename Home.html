<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental House</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        header{
            background:#2c3e50;
            color:white;
            padding:15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 15px;
        }

        .hero{
            text-align:center;
            padding:100px 20px;
            background:#3498db;
            color:white;
        }

        .hero h1{
            font-size:45px;
        }

        .hero p{
            margin:15px 0;
        }

        .btn{
            display:inline-block;
            background:white;
            color:#3498db;
            padding:12px 25px;
            text-decoration:none;
            border-radius:5px;
            font-weight:bold;
        }

        footer{
            background:#2c3e50;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:50px;
        }
    </style>
</head>
<body>

<header>
    <h2>Rental House</h2>

    <nav>
        <a href="#">Home</a>
        <a href="#">Houses</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Find Your Dream Rental House</h1>
    <p>Affordable, Comfortable & Secure Homes</p>
    <a href="#" class="btn">Explore Houses</a>
</section>

<footer>
    <p>© 2026 Rental House. All Rights Reserved.</p>
</footer>

</body>
</html>
