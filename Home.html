<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUMA Shoes</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}
header{
    background:black;
    color:white;
    padding:15px;
    text-align:center;
}
nav{
    background:#222;
    text-align:center;
    padding:10px;
}
nav a{
    color:white;
    text-decoration:none;
    margin:15px;
}
.hero{
    text-align:center;
    padding:40px;
}
.hero img{
    width:300px;
    border-radius:10px;
}
button{
    background:red;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}
.products{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin:30px;
}
.card{
    background:white;
    width:220px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    padding:15px;
    text-align:center;
}
.card img{
    width:180px;
}
footer{
    background:black;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>
<h1>PUMA SHOES</h1>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Men</a>
<a href="#">Women</a>
<a href="#">Sports</a>
<a href="#">Contact</a>
</nav>

<section class="hero">
<h2>Welcome to PUMA Shoes</h2>
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" alt="Shoes">
<h3>Running Shoes</h3>
<p>Price: ₹4,999</p>
<button>Buy Now</button>
</section>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400" alt="">
<h3>PUMA White</h3>
<p>₹3,999</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400" alt="">
<h3>PUMA Black</h3>
<p>₹5,499</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1543508282-6319a3e2621f?w=400" alt="">
<h3>PUMA Sport</h3>
<p>₹6,299</p>
<button>Add to Cart</button>
</div>

</section>

<footer>
<p>© 2026 PUMA Shoes Website</p>
</footer>

</body>
