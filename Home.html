<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental House - Home</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        header{
            background:#2c3e50;
            color:white;
            padding:15px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-weight:bold;
        }

        .hero{
            height:500px;
            background:url("https://images.unsplash.com/photo-1568605114967-8130f3a36994") center/cover;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            text-align:center;
        }

        .hero h1{
            font-size:50px;
        }

        .hero p{
            margin:15px 0;
            font-size:20px;
        }

        .btn{
            background:#ff9800;
            color:white;
            padding:12px 25px;
            text-decoration:none;
            border-radius:5px;
        }

        .houses{
            padding:50px;
            display:flex;
            justify-content:space-around;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            width:300px;
            margin:20px;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        .card img{
            width:100%;
            height:200px;
        }

        .card h3{
            padding:10px;
        }

        .card p{
            padding:0 10px 10px;
        }

        .card button{
            width:100%;
            padding:12px;
            border:none;
            background:#2c3e50;
            color:white;
            cursor:pointer;
        }

        footer{
            background:#2c3e50;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:30px;
        }
    </style>
</head>

<body>

<header>
    <h2>Rental House</h2>

    <nav>
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="houses.html">Houses</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <div>
        <h1>Find Your Dream Rental House</h1>
        <p>Best Houses at Affordable Prices</p>
        <a href="houses.html" class="btn">Explore Houses</a>
    </div>
</section>

<section class="houses">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be">
        <h3>Luxury Villa</h3>
        <p>₹25,000 / Month</p>
        <button>View Details</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
        <h3>Modern Apartment</h3>
        <p>₹15,000 / Month</p>
        <button>View Details</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1448630360428-65456885c650">
        <h3>Family House</h3>
        <p>₹20,000 / Month</p>
        <button>View Details</button>
    </div>

</section>

<footer>
    <p>© 2026 Rental House Website | All Rights Reserved</p>
</footer>

</body>
</html>
