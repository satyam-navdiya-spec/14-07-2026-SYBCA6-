<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Future College</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#0b3d91;
color:white;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:30px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:18px;
transition:0.3s;
}

nav a:hover{
color:yellow;
}

.hero{
height:90vh;
background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:15px 35px;
background:#ff9800;
color:white;
text-decoration:none;
border-radius:5px;
font-size:18px;
transition:0.3s;
}

.btn:hover{
background:#e68900;
}

.features{
padding:70px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
text-align:center;
}

.card h2{
margin:20px 0;
color:#0b3d91;
}

.card p{
color:#555;
line-height:1.6;
}

footer{
background:#0b3d91;
color:white;
text-align:center;
padding:20px;
margin-top:50px;
}
</style>

</head>

<body>

<header>

<div class="logo">
Bright Future College
</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Courses</a>
<a href="#">Faculty</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<div>

<h1>Welcome To Bright Future College</h1>

<p>Empowering Students With Knowledge, Skills And Innovation.</p>

<a href="#" class="btn">Apply Now</a>

</div>

</section
